name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v35
      - name: Check flake
        run: nix flake check --print-build-logs
      - name: Rust and contract checks
        run: nix develop .#default --command just ci-checks
      - name: Live Elements protocol regtests
        timeout-minutes: 15
        env:
          RUST_BACKTRACE: "1"
        run: nix develop .#default --command just regtest
